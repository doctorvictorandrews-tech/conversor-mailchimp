<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor in.pacto | Página Única</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .brand-orange { color: #F15A24; }
        .brand-grey { color: #4D4D4D; }
        
        /* Container de renderização oculto */
        #render-area {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 800px;
            background: white;
        }
    </style>
</head>
<body class="text-slate-800">

    <div class="max-w-2xl mx-auto py-12 px-6">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black tracking-tighter">
                <span class="brand-orange">in</span><span class="brand-grey">.pacto</span>
            </h1>
            <p class="text-slate-500 mt-2 font-bold uppercase tracking-widest text-[10px]">Gerador de Relatórios em Página Única</p>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl p-8 border border-slate-200">
            <textarea id="htmlInput" 
                class="w-full h-64 p-4 border-2 border-slate-100 rounded-2xl font-mono text-[10px] focus:border-orange-500 outline-none mb-6 bg-slate-50"
                placeholder="Cole o código fonte (CTRL+U) aqui..."></textarea>

            <button onclick="gerarPdfContinuo()" id="btnAction"
                class="w-full bg-[#F15A24] hover:bg-orange-600 text-white font-black py-5 rounded-2xl transition-all shadow-xl text-lg uppercase">
                Gerar PDF Sem Quebras
            </button>
            
            <div id="status" class="hidden mt-4 text-center text-sm font-bold brand-grey animate-pulse">
                Processando layout contínuo... aguarde.
            </div>
        </div>
    </div>

    <div id="render-area"></div>

    <script>
        async function gerarPdfContinuo() {
            const code = document.getElementById('htmlInput').value;
            const btn = document.getElementById('btnAction');
            const status = document.getElementById('status');
            const renderArea = document.getElementById('render-area');

            if (!code) return alert("Cole o código!");

            btn.disabled = true;
            status.classList.remove('hidden');

            try {
                // 1. Limpa e insere o HTML
                let cleanCode = code.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, "");
                cleanCode = cleanCode.replace(/id="awesomewrap"|id="awesomebar"|class="archive_header"/gi, 'style="display:none !important;"');
                renderArea.innerHTML = cleanCode;

                // 2. Aguarda carregamento de imagens
                await new Promise(resolve => setTimeout(resolve, 2500));

                // 3. Captura o conteúdo como Canvas
                const canvas = await html2canvas(renderArea, {
                    scale: 2,
                    useCORS: true,
                    allowTaint: true,
                    logging: false,
                    width: 800
                });

                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                
                // 4. Cria o PDF com a ALTURA EXATA do conteúdo (Página Única)
                const { jsPDF } = window.jspdf;
                const pdfWidth = 800;
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'px',
                    format: [pdfWidth, pdfHeight]
                });

                // Adiciona a imagem cobrindo toda a página única
                pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);

                // 5. Injeta o texto invisível por cima para permitir seleção
                // Nota: O html2canvas nativo não mantém texto selecionável. 
                // Para ter texto 100% selecionável em página única real, 
                // o melhor caminho é o salvamento nativo que fizemos antes, 
                // ajustando apenas o tamanho da página no driver de impressão.
                
                pdf.save("Relatorio_inPacto_PaginaUnica.pdf");

            } catch (err) {
                console.error(err);
                alert("Erro ao processar.");
            } finally {
                btn.disabled = false;
                status.classList.add('hidden');
                renderArea.innerHTML = "";
            }
        }
    </script>
</body>
</html>
