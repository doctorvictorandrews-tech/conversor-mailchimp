<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Relatórios | in.pacto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .color-in { color: #F15A24; }
        .color-pacto { color: #4D4D4D; }
        .bg-in { background-color: #F15A24; }
        
        /* Iframe invisível para o usuário, mas legível para o script */
        #email-frame {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 800px; /* Largura padrão para forçar o layout correto do Mailchimp */
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen">

    <div id="loading-overlay" class="hidden fixed inset-0 bg-[#f8f9fa] z-50 flex-col items-center justify-center">
        <h2 class="text-3xl font-black mb-4">
            <span class="color-in">in</span><span class="color-pacto">.pacto</span>
        </h2>
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#F15A24] mb-4"></div>
        <p class="text-[#4D4D4D] font-bold">Lendo tabelas e processando imagens...</p>
        <p class="text-slate-400 text-xs mt-2">Isso pode levar até 5 segundos.</p>
    </div>

    <div id="ui-main" class="max-w-3xl mx-auto py-12 px-6">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black tracking-tighter">
                <span class="color-in">in</span><span class="color-pacto">.pacto</span>
            </h1>
            <p class="text-slate-500 mt-2 font-bold uppercase tracking-widest text-[10px]">Inteligência em Comunicação | Conversor de Relatórios</p>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
            <div class="p-8">
                <div class="grid grid-cols-2 gap-4 mb-8 text-[11px] border-b border-slate-100 pb-6">
                    <div class="flex gap-2">
                        <span class="color-in font-bold text-lg">01.</span>
                        <p class="text-slate-600">No Mailchimp, use o <strong>View in Browser</strong> e copie o código fonte (<kbd class="bg-slate-100 px-1 font-mono">CTRL+U</kbd>).</p>
                    </div>
                    <div class="flex gap-2">
                        <span class="color-in font-bold text-lg">02.</span>
                        <p class="text-slate-600">Cole abaixo. O sistema isolará o código para evitar quebras de layout.</p>
                    </div>
                </div>

                <textarea id="htmlInput" 
                    class="w-full h-56 bg-slate-50 border-2 border-slate-200 rounded-2xl p-4 text-slate-500 font-mono text-[10px] focus:border-orange-500 focus:outline-none transition-all resize-none mb-6 shadow-inner"
                    placeholder="Cole aqui o código fonte (CTRL+V)..."></textarea>

                <button onclick="generatePDF()"
                    class="w-full bg-in hover:bg-orange-600 text-white font-black py-5 rounded-2xl transition-all shadow-xl shadow-orange-200 flex items-center justify-center gap-3 text-lg">
                    GERAR PDF AGORA
                </button>
            </div>
        </div>
    </div>

    <iframe id="email-frame"></iframe>

    <script>
        async function generatePDF() {
            const code = document.getElementById('htmlInput').value;
            if (!code.trim()) {
                alert("Cole o código do Mailchimp primeiro.");
                return;
            }

            const overlay = document.getElementById('loading-overlay');
            const iframe = document.getElementById('email-frame');
            
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');

            try {
                // 1. Acessa o documento dentro do Iframe
                const doc = iframe.contentDocument || iframe.contentWindow.document;

                // 2. Limpeza básica para não sair o cabeçalho cinza do Mailchimp
                let cleanCode = code.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, "");
                cleanCode = cleanCode.replace(/id="awesomewrap"|id="awesomebar"|class="archive_header"/gi, 'style="display:none !important;"');

                // 3. Escreve o código DENTRO do iframe (isolamento total)
                doc.open();
                doc.write(cleanCode);
                doc.close();

                // Adiciona um estilo extra dentro do iframe para garantir fundo branco e resetar margens
                const style = doc.createElement('style');
                style.textContent = `
                    body, html { margin: 0 !important; padding: 0 !important; background: white !important; width: 800px !important; }
                    table { border-collapse: collapse; }
                `;
                doc.head.appendChild(style);

                // 4. Aguarda as imagens carregarem dentro do iframe
                await new Promise(resolve => setTimeout(resolve, 3000));

                // 5. Pega a altura real que o e-mail ocupou dentro do iframe
                const body = doc.body;
                const html = doc.documentElement;
                const height = Math.max(
                    body.scrollHeight, body.offsetHeight,
                    html.clientHeight, html.scrollHeight, html.offsetHeight
                );

                // 6. Configura a foto (html2pdf)
                const opt = {
                    margin: 0,
                    filename: 'Relatorio_MDA_in_pacto.pdf',
                    image: { type: 'jpeg', quality: 1 },
                    html2canvas: { 
                        scale: 2, 
                        useCORS: true, 
                        width: 800, // Trava a largura
                        windowWidth: 800 
                    },
                    jsPDF: { 
                        unit: 'px', 
                        format: [800, height], // Formato contínuo com a altura calculada
                        orientation: 'portrait' 
                    }
                };

                // 7. Manda o html2pdf capturar o body DENTRO do Iframe
                await html2pdf().set(opt).from(doc.body).save();

            } catch (err) {
                console.error("Erro:", err);
                alert("Ocorreu um erro. Tente recarregar a página e colar novamente.");
            } finally {
                // 8. Tira a tela de carregamento e limpa o iframe
                overlay.classList.remove('flex');
                overlay.classList.add('hidden');
                
                const doc = iframe.contentDocument || iframe.contentWindow.document;
                doc.open();
                doc.write('');
                doc.close();
            }
        }
    </script>
</body>
</html>
