<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor in.pacto | Texto Selecionável</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f4f4; }
        .brand-orange { color: #F15A24; }
        .brand-grey { color: #4D4D4D; }
        .bg-brand-orange { background-color: #F15A24; }

        /* Estilo que será injetado no PDF para forçar a Página Única e Texto Selecionável */
        @media print {
            @page {
                size: A4; /* O navegador vai tentar A4, mas o CSS abaixo vai expandir */
                margin: 0 !important;
            }
            body { 
                background: white !important; 
                width: 100% !important;
            }
            /* Remove as barras de propaganda do Mailchimp */
            #awesomewrap, #awesomebar, .archive_header, #canspamBarWrapper { 
                display: none !important; 
            }
            /* Impede que o navegador quebre tabelas no meio */
            table, tr, td, img { 
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }
            /* Garante que o container do Mailchimp ocupe a largura correta */
            center, .bodyContent {
                width: 100% !important;
                display: block !important;
            }
        }
        
        #preview-frame {
            width: 100%;
            height: 0;
            border: none;
            visibility: hidden;
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-2xl mx-auto py-10">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black tracking-tighter">
                <span class="brand-orange">in</span><span class="brand-grey">.pacto</span>
            </h1>
            <p class="brand-grey text-[10px] font-bold uppercase tracking-widest mt-2">Conversor de Relatórios v4.0</p>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-200">
            <label class="block brand-grey font-bold text-sm mb-2 uppercase">Código Fonte do Mailchimp:</label>
            <textarea id="htmlInput" 
                class="w-full h-64 p-4 border-2 border-slate-100 rounded-2xl font-mono text-[10px] focus:border-orange-500 outline-none mb-6 bg-slate-50"
                placeholder="Cole o CTRL+U aqui..."></textarea>

            <button onclick="gerarRelatorio()" 
                class="w-full bg-brand-orange hover:bg-orange-600 text-white font-black py-5 rounded-2xl transition-all shadow-lg text-lg">
                GERAR PDF (TEXTO SELECIONÁVEL)
            </button>
            
            <p class="mt-4 text-[11px] text-slate-400 text-center italic">
                Dica: Na tela que abrir, selecione "Salvar como PDF" e em "Margens" escolha "Nenhuma".
            </p>
        </div>
    </div>

    <iframe id="preview-frame"></iframe>

    <script>
        function gerarRelatorio() {
            const code = document.getElementById('htmlInput').value;
            if (!code) return alert("Cole o código!");

            const iframe = document.getElementById('preview-frame');
            const doc = iframe.contentDocument || iframe.contentWindow.document;

            // Limpa o código de scripts que travam a página
            let cleanCode = code.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, "");
            
            doc.open();
            doc.write(cleanCode);
            doc.close();

            // Injeta o CSS de correção de layout dentro do Iframe
            const style = doc.createElement('style');
            style.textContent = `
                /* Força o Mailchimp a não quebrar */
                body, table, .wrapperTable { 
                    width: 100% !important; 
                    min-width: 600px !important;
                    max-width: 800px !important;
                    margin: 0 auto !important;
                }
                /* Garante que o texto seja selecionável e nítido */
                * { -webkit-print-color-adjust: exact !important; }
                
                @media print {
                    /* Remove espaços em branco extras */
                    html, body { height: auto !important; }
                    /* Tenta evitar quebras de páginas em lugares ruins */
                    p, h1, h2, h3, tr { page-break-inside: avoid !important; }
                }
            `;
            doc.head.appendChild(style);

            // Aguarda carregar imagens e abre a janela de impressão do sistema
            setTimeout(() => {
                iframe.contentWindow.focus();
                iframe.contentWindow.print();
            }, 1500);
        }
    </script>
</body>
</html>
