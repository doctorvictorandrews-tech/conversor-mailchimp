<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor InPacto | Mailchimp para PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Esconde o iframe da tela, mas permite que ele seja impresso */
        #print-frame {
            position: absolute;
            width: 0;
            height: 0;
            border: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="ui-container" class="max-w-2xl mx-auto py-16 px-6">
        <div class="text-center mb-10">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Conversor de Relatórios</h1>
            <p class="text-slate-500 mt-2 font-medium">Edição InPacto v2.0</p>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 mb-6">
            <h2 class="text-sm font-bold text-blue-600 uppercase tracking-widest mb-6">Como usar</h2>
            
            <div class="space-y-4 mb-8">
                <div class="flex gap-3 items-start">
                    <span class="bg-blue-50 text-blue-600 rounded-lg px-2 py-1 text-xs font-bold">1</span>
                    <p class="text-sm text-slate-600">No Mailchimp, use o <strong>View in Browser</strong> e pressione <strong>CTRL + U</strong>.</p>
                </div>
                <div class="flex gap-3 items-start">
                    <span class="bg-blue-50 text-blue-600 rounded-lg px-2 py-1 text-xs font-bold">2</span>
                    <p class="text-sm text-slate-600">Copie tudo, cole abaixo e clique no botão preto.</p>
                </div>
            </div>

            <textarea id="htmlInput" 
                class="w-full h-40 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl p-4 text-slate-600 font-mono text-xs focus:border-blue-500 focus:bg-white focus:outline-none transition-all resize-none"
                placeholder="Cole o código-fonte (HTML) aqui..."></textarea>

            <button onclick="generatePDF()" 
                class="mt-6 w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-2xl transition-all shadow-xl shadow-slate-200 flex items-center justify-center gap-3">
                GERAR PDF
            </button>
        </div>
        
        <p class="text-center text-slate-400 text-xs">A conversão ocorre no seu navegador. Privacidade garantida.</p>
    </div>

    <iframe id="print-frame"></iframe>

    <script>
        function generatePDF() {
            const code = document.getElementById('htmlInput').value;
            if (!code) {
                alert("Por favor, cole o código HTML primeiro.");
                return;
            }

            const iframe = document.getElementById('print-frame');
            const doc = iframe.contentDocument || iframe.contentWindow.document;

            // 1. Limpeza do código (remover scripts e barras do Mailchimp)
            let cleanCode = code.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, "");
            
            // Remove a barra de arquivo do Mailchimp (o topo cinza)
            cleanCode = cleanCode.replace(/id="awesomewrap"|id="awesomebar"|class="archive_header"/gi, 'style="display:none;"');

            // 2. Escreve o conteúdo no iframe
            doc.open();
            doc.write(cleanCode);
            doc.close();

            // 3. Adiciona um CSS extra dentro do iframe para garantir que o PDF fique bonito
            const style = doc.createElement('style');
            style.textContent = `
                @media print {
                    @page { margin: 0; size: auto; }
                    body { margin: 0; padding: 0; }
                    /* Força a remoção de itens indesejados caso o ID mude */
                    #awesomewrap, #awesomebar, .mceFooterSection, #canspamBarWrapper { display: none !important; }
                }
            `;
            doc.head.appendChild(style);

            // 4. Aguarda as imagens carregarem e dispara a impressão
            setTimeout(() => {
                iframe.contentWindow.focus();
                iframe.contentWindow.print();
            }, 800);
        }
    </script>
</body>
</html>
